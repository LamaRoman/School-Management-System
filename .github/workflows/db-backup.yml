name: Daily Database Backup

on:
  schedule:
    - cron: '0 20 * * *'  # Runs at 20:00 UTC = 01:45 AM Nepal Time (NPT is UTC+5:45)
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest

    env:
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg curl
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt noble-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          FILENAME="school_backup_${TIMESTAMP}.sql"
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" -F p -f "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Install B2 CLI
        run: pip install b2

      - name: Upload to Backblaze B2
        env:
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
        run: |
          b2 file upload "$B2_BUCKET_NAME" "$FILENAME" "backups/$FILENAME"
          echo "✅ Backup uploaded: backups/$FILENAME"

      - name: Delete backups older than 30 days
        env:
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
        run: |
          CUTOFF=$(date -d '30 days ago' +%s)000
          b2 ls --long "$B2_BUCKET_NAME" backups/ | while read -r timestamp _ _ _ filename; do
            if [ "$timestamp" -lt "$CUTOFF" ]; then
              b2 delete-file-version "$filename" $(b2 ls --long "$B2_BUCKET_NAME" "$filename" | awk '{print $3}')
              echo "🗑️ Deleted old backup: $filename"
            fi
          done

      - name: Notify success
        run: echo "✅ Database backup completed successfully at $(date)"
